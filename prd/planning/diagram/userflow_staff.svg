<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 456" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>Exchange shop staff user flow</title>
<desc>Four sequential steps: receive reservation alert, check upcoming visitors, verify ID and take payment, mark exchange complete. Side note: if the customer does not visit within 2 hours, the reservation auto-cancels and the inventory hold is released.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="180" y="60" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Receive reservation alert</text>
<line x1="340" y1="104" x2="340" y2="164" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="164" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="186" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Check upcoming visitors</text>
<line x1="340" y1="208" x2="340" y2="268" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="268" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Verify ID and take payment</text>
<line x1="340" y1="312" x2="340" y2="372" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="372" width="320" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#085041">Mark exchange complete</text>

<line x1="500" y1="186" x2="522" y2="175" stroke="#A32D2D" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-red)"/>
<rect x="522" y="140" width="140" height="70" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1"/>
<text x="592" y="164" text-anchor="middle" font-size="10.5" font-weight="600" fill="#791F1F">No visit within 2h</text>
<text x="592" y="182" text-anchor="middle" font-size="10.5" fill="#791F1F">Auto-cancel and</text>
<text x="592" y="196" text-anchor="middle" font-size="10.5" fill="#791F1F">release hold</text>

</svg>
