<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 808" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
<title>Admin user flow</title>
<desc>Onboarding: receive shop registration request, review documents, approve or reject, review preferential rate data, publish rates. Monitoring: monitor reservations and trades, alert on high-value bookings.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="180" y="60" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="82" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Receive shop registration request</text>
<line x1="340" y1="104" x2="340" y2="164" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="164" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="186" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Review documents</text>
<line x1="340" y1="208" x2="340" y2="268" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="268" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="290" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Approve or reject</text>
<line x1="340" y1="312" x2="340" y2="372" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="372" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="394" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Review preferential rate data</text>
<line x1="340" y1="416" x2="340" y2="476" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="476" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="498" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Publish rates</text>
<line x1="340" y1="520" x2="340" y2="620" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="360" y="570" font-size="12" fill="#6B7280">Ongoing, after shop is live</text>

<rect x="180" y="620" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="642" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Monitor reservations and trades</text>
<line x1="340" y1="664" x2="340" y2="724" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="180" y="724" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="340" y="746" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#633806">Alert on high-value bookings</text>

</svg>
